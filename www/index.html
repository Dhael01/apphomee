<html lang="es">
<head>

<title>pawnest</title>

<style>
  :root{
    --bg:#f3f5f1;--surface:#ffffff;--surface2:#eaeee7;--surface3:#dfe4db;
    --text:#2a302c;--text2:#59615b;--text3:#8a918a;--border:#e7ebe3;--border2:#d4dacf;
    --info-bg:#e2efe9;--info:#2e7d6a;--success-bg:#e3f0e3;--success:#3c7d50;
    --warning-bg:#f6edda;--warning:#94661f;--danger-bg:#f6e6e2;--danger:#b05444;
    --radius:12px;--radius-lg:16px;
    --shadow:0 1px 2px rgba(40,55,48,.04),0 4px 14px rgba(40,55,48,.05);
    --shadow-soft:0 1px 3px rgba(40,55,48,.05);
    --font:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;-webkit-text-size-adjust:100%;}
  body{padding-bottom:84px;}
  input,select,textarea,button{font-family:inherit;font-size:16px;}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);transition:border-color .15s ease,box-shadow .15s ease;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--info);box-shadow:0 0 0 3px var(--info-bg);}
  textarea{resize:vertical;}
  button{cursor:pointer;}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(243,245,241,.82);backdrop-filter:saturate(1.4) blur(10px);-webkit-backdrop-filter:saturate(1.4) blur(10px);padding:13px 16px 9px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;letter-spacing:-.01em;}
  .brandbox{display:inline-block;line-height:0;}
  .menuwrap{position:relative;}
  .menubtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
  .menubtn.on{background:var(--info-bg);color:var(--info);border-color:transparent;}
  .menu{position:absolute;top:44px;right:0;z-index:50;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:6px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease;}
  .menu.open{opacity:1;transform:translateY(0);pointer-events:auto;}
  .menu button{width:100%;border:none;background:transparent;color:var(--text);font-size:14px;font-weight:600;text-align:left;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;}
  .menu button .ni{font-size:18px;line-height:1;}
  .menu button.on{background:var(--info-bg);color:var(--info);}
  .brand .ico{font-size:22px;}
  .right{display:flex;align-items:center;gap:8px;}
  .pts{display:none;align-items:center;gap:4px;font-size:13px;background:var(--warning-bg);color:var(--warning);padding:4px 10px;border-radius:var(--radius);font-weight:600;}
  .user{font-size:14px;font-weight:600;color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:4px 0;}
  .status{font-size:12px;color:var(--text3);padding:4px 14px;min-height:14px;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex:none;}
  .dot.on{background:#1d9e75;} .dot.off{background:#d85a30;}
  .wrap{padding:8px 14px 20px;max-width:680px;margin:0 auto;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow-soft);}
  .card.soft{background:var(--surface2);border-color:transparent;box-shadow:none;}
  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px;}
  .metric{background:var(--surface2);border-radius:var(--radius);padding:12px 14px;}
  .metric .l{font-size:12px;color:var(--text2);margin-bottom:3px;}
  .metric .v{font-size:22px;font-weight:700;letter-spacing:-.02em;}
  .lbl{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;}
  .field{margin-bottom:8px;}
  .btn{padding:10px 14px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-weight:600;display:inline-flex;align-items:center;gap:6px;justify-content:center;transition:transform .12s ease,box-shadow .15s ease,background .15s ease;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--info);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(46,125,106,.22);}
  .btn.ok{background:var(--success-bg);color:var(--success);border-color:transparent;}
  .btn.no{background:var(--danger-bg);color:var(--danger);border-color:transparent;}
  .btn.block{width:100%;}
  .row{display:flex;align-items:center;gap:10px;}
  .grow{flex:1;min-width:0;}
  .pill{font-size:12px;padding:3px 9px;border-radius:var(--radius);font-weight:600;display:inline-flex;align-items:center;gap:4px;}
  .del{background:none;border:none;color:var(--text3);font-size:18px;padding:4px;}
  .bar{height:9px;background:var(--surface3);border-radius:6px;overflow:hidden;display:flex;}
  .bar.big{height:13px;}
  .muted{font-size:12px;color:var(--text3);}
  .sec-title{font-size:15px;font-weight:700;letter-spacing:-.01em;margin:20px 0 9px;display:flex;align-items:center;gap:7px;}
  .seg{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
  .seg button{border:none;padding:7px 13px;font-size:13px;background:transparent;color:var(--text);}
  .seg button.on{background:var(--info-bg);color:var(--info);font-weight:600;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;}
  .smallinput{width:auto;padding:7px 9px;font-size:14px;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .day{background:var(--surface2);border-radius:8px;padding:6px 4px;min-height:54px;}
  .dayn{font-size:10px;color:var(--text3);text-transform:uppercase;text-align:center;margin-bottom:4px;letter-spacing:.5px;}
  .chip{font-size:10px;padding:4px 5px;border-radius:6px;margin-bottom:4px;line-height:1.25;display:flex;gap:4px;align-items:flex-start;}
  .check{width:16px;height:16px;flex:none;border-radius:50%;border:1.5px solid currentColor;background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;color:inherit;padding:0;}
  .check.done{background:var(--success);border-color:var(--success);color:#fff;}
  .daybtn{font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);}
  .daybtn.on{background:var(--info-bg);color:var(--info);border-color:transparent;font-weight:600;}
  .shopgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;}
  .shop{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;}
  .shop.owned{border-color:var(--success);}
  .colorbtn{width:32px;height:32px;border-radius:50%;border:2px solid transparent;}
  .colorbtn.on{outline:2px solid var(--info);outline-offset:2px;}
  .floatp{position:absolute;font-size:13px;font-weight:700;color:var(--success);pointer-events:none;animation:fp 1.4s ease-out forwards;z-index:5;}
  @keyframes fp{0%{opacity:0;transform:translateY(6px);}20%{opacity:1;}100%{opacity:0;transform:translateY(-20px);}}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);border-top:1px solid var(--border);display:flex;overflow-x:auto;padding:8px 6px;gap:2px;box-shadow:0 -2px 16px rgba(40,55,48,.06);}
  .nav::-webkit-scrollbar{display:none;}
  .nav button{flex:0 0 auto;border:none;background:transparent;color:var(--text3);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 11px;border-radius:12px;min-width:58px;transition:background .15s ease,color .15s ease;}
  .nav button .ni{font-size:20px;line-height:1;}
  .nav button .ni svg{width:23px;height:23px;display:block;}
  .menu button .ni svg{width:19px;height:19px;display:block;}
  .nav button.on{color:var(--info);background:var(--info-bg);}
  .empty{text-align:center;color:var(--text3);font-size:14px;padding:18px 8px;}
  .setup{max-width:520px;margin:0 auto;padding:24px 18px;}
  .setup h1{font-size:24px;margin:0 0 6px;}
  .setup .step{font-size:13px;color:var(--success);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:18px;}
  /* ===== TEMA OSCURO ===== */
  /* Manual: el usuario lo eligió en Mascota > Temas */
  html[data-theme="dark"]{--bg:#181c1a;--surface:#212623;--surface2:#272d29;--surface3:#323833;
    --text:#eef1ec;--text2:#aeb5ad;--text3:#828a83;--border:#2e3431;--border2:#414740;
    --info-bg:#113b32;--info:#8fd3bf;--success-bg:#123d27;--success:#9fe0b3;
    --warning-bg:#3f2e10;--warning:#f0cd8b;--danger-bg:#3f211c;--danger:#f0b3a6;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.25);--shadow-soft:0 1px 3px rgba(0,0,0,.3);}
  html[data-theme="dark"] .topbar{background:rgba(24,28,26,.82);}
  html[data-theme="dark"] .nav{box-shadow:0 -2px 16px rgba(0,0,0,.3);}
  /* Automático: sigue al sistema, salvo que el usuario haya forzado claro u oscuro */
  @media (prefers-color-scheme:dark){
    html:not([data-theme="light"]):not([data-theme="dark"]){--bg:#181c1a;--surface:#212623;--surface2:#272d29;--surface3:#323833;
      --text:#eef1ec;--text2:#aeb5ad;--text3:#828a83;--border:#2e3431;--border2:#414740;
      --info-bg:#113b32;--info:#8fd3bf;--success-bg:#123d27;--success:#9fe0b3;
      --warning-bg:#3f2e10;--warning:#f0cd8b;--danger-bg:#3f211c;--danger:#f0b3a6;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.25);--shadow-soft:0 1px 3px rgba(0,0,0,.3);}
    html:not([data-theme="light"]):not([data-theme="dark"]) .topbar{background:rgba(24,28,26,.82);}
    html:not([data-theme="light"]):not([data-theme="dark"]) .nav{box-shadow:0 -2px 16px rgba(0,0,0,.3);}
  }
</style>
</head>

  function temaResuelto(){ var t=getTema(); if(t==="dark")return "dark"; if(t==="light")return "light"; return (window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"; }

  function hayHijos(){ return state.usuarios.some(function(u){ return esHijo(u); }); }

  function darPuntos(u,n){ state.puntos[u]=(state.puntos[u]||0)+n; }
  function fallbackCopiar(txt,ok,fail){
    try{ var ta=document.createElement("textarea"); ta.value=txt; ta.setAttribute("readonly","");
      ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,txt.length);
      var done=document.execCommand("copy"); document.body.removeChild(ta);
      if(done) ok(); else fail();
    }catch(e){ fail(); }
  }
  function copiarTexto(txt,ok,fail){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(ok,function(){ fallbackCopiar(txt,ok,fail); });

  function irAFamilia(){
    renderCargando("Cargando tu hogar…");
    var miId=(sesion&&sesion.user)?sesion.user.id:null;
    sb.from("family_members").select("family_id,families(id,name)").eq("user_id",miId).then(function(res){
      if(res.error){ renderFatal("No se pudieron cargar tus hogares: "+res.error.message); return; }
      // solo MIS membresías, y sin repetir la misma casa
      var vistos={}; familias=[];
      (res.data||[]).forEach(function(r){ if(r.family_id && !vistos[r.family_id]){ vistos[r.family_id]=true; familias.push({id:r.family_id,name:(r.families&&r.families.name)||"Mi hogar"}); } });
      if(familias.length===0){ renderFamilyChoice(); return; }
      var prefer=getFamSel(); familiaActual=null;
      if(prefer) familiaActual=familias.filter(function(f){return f.id===prefer;})[0]||null;
      if(!familiaActual && familias.length===1) familiaActual=familias[0];
      if(!familiaActual){ renderFamilyChoice(); return; }
      hogar=familiaActual.id; setFamSel(hogar);
      arrancarApp();
    });
  }

  function cargarYsuscribir(){

      if(res.error && res.error.code==="PGRST116"){

        var inicial=JSON.parse(JSON.stringify(DEFAULT)); inicial.adminId=(sesion&&sesion.user)?sesion.user.id:null;
        sb.from("hogares").insert({id:hogar,data:inicial}).then(function(r2){

  function conError(err){

    if(msg.indexOf("relation")>=0 || msg.indexOf("does not exist")>=0) msg="Falta crear la tabla en Supabase. Revisa el paso de la guía sobre la tabla 'hogares'.";
    if(msg.indexOf("JWT")>=0 || msg.indexOf("apikey")>=0 || msg.indexOf("Invalid")>=0) msg="Tu sesión pudo expirar. Cierra sesión y vuelve a entrar.";
    setStatus("Sin conexión","off");

    var r=document.getElementById("reintentar"); if(r)r.onclick=cargarYsuscribir;

  var saveTimer=null;
  function save(){
    // refresco optimista local + guardado en la nube con pequeño debounce
    if(!conectado||!sb){ return; }
    setStatus("Guardando…","on");
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      state._savedBy=clientId; // marca de quién hizo este guardado (para ignorar mi propio eco)
      sb.from("hogares").update({data:state, updated_at:new Date().toISOString()}).eq("id",hogar).then(function(res){
        if(res.error){ setStatus("Error al guardar","off"); }
        else { ultimoGuardado=new Date().toLocaleTimeString("es-CL"); setStatus("Guardado · "+ultimoGuardado,"on"); }
      });
    },350);
  }

  function suscribir(){
    try{
      sb.channel("hogar-"+hogar)
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"hogares",filter:"id=eq."+hogar},function(payload){
          var nuevo=payload.new&&payload.new.data;
          // ignora el eco de MIS propios guardados (si no, revierte cambios recién hechos)
          if(nuevo&&nuevo._savedBy===clientId) return;
          if(nuevo){ state=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),nuevo); render(); setStatus("Actualizado por la familia · "+new Date().toLocaleTimeString("es-CL"),"on"); }
        }).subscribe();
    }catch(e){}
  }

  function calcularAportes(){
    var cT=state.cuentas.reduce(function(s,i){return s+(+i.monto||0);},0);
    var dT=state.despensa.reduce(function(s,i){return s+(+i.monto||0);},0);
    var gasto=cT+dT, us=adultos(); // los hijos no participan del reparto de cuentas
    function sueldo(u){return +state.sueldos[u]||0;} function minimo(u){return +state.minimos[u]||0;}
    var ingresoTotal=us.reduce(function(s,u){return s+sueldo(u);},0);
    var base={},baseTotal=0;
    if(state.metodo==="proporcional"){ us.forEach(function(u){base[u]=sueldo(u);}); baseTotal=ingresoTotal; }
    else { us.forEach(function(u){base[u]=Math.max(0,sueldo(u)-minimo(u));}); baseTotal=us.reduce(function(s,u){return s+base[u];},0); }
    var res={};
    us.forEach(function(u){ var frac=baseTotal>0?base[u]/baseTotal:1/us.length; var aC=cT*frac,aD=dT*frac,ap=aC+aD;
      res[u]={sueldo:sueldo(u),minimo:minimo(u),aporte:ap,aCuentas:aC,aDespensa:aD,queda:sueldo(u)-ap,parte:frac*100}; });
    return {gasto:gasto,cuentasTotal:cT,despensaTotal:dT,ingresoTotal:ingresoTotal,baseTotal:baseTotal,res:res,sinExcedente:state.metodo==="minimo"&&baseTotal===0};
  }
  function ocurrencias(){ var occ=[]; state.tareas.forEach(function(t){ var dias=t.freq==="diario"?[0,1,2,3,4,5,6]:(t.dias||[]).slice(); if(dias.length===0)dias=[0]; dias.forEach(function(d){occ.push({tarea:t,dia:d});}); }); return occ; }
  function planSemana(semana){
    var us=state.usuarios,n=us.length,porDia=[]; for(var i=0;i<7;i++)porDia.push([]);
    var carga={},vecesPesada={}; us.forEach(function(u){carga[u]=0;vecesPesada[u]=0;}); var avisoTope=false;
    var occ=ocurrencias().sort(function(a,b){return pesoNivel(b.tarea.nivel)-pesoNivel(a.tarea.nivel);});
    occ.forEach(function(o,oi){ var esP=(o.tarea.nivel||2)===3; var orden=[]; for(var k=0;k<n;k++)orden.push(us[(k+semana+oi)%n]);
      orden.sort(function(a,b){return carga[a]-carga[b];}); var el;
      if(esP){ el=null; for(var j=0;j<orden.length;j++){ if(vecesPesada[orden[j]]<state.topePesada){el=orden[j];break;} } if(!el){el=orden[0];avisoTope=true;} } else el=orden[0];
      porDia[o.dia].push({tarea:o.tarea,user:el}); carga[el]+=pesoNivel(o.tarea.nivel); if(esP)vecesPesada[el]++; });
    return {porDia:porDia,carga:carga,vecesPesada:vecesPesada,avisoTope:avisoTope};

  function animoHogar(){
    var p=planSemana(state.rotSemana); var totalOcc=0,hechos=0;
    for(var d=0;d<7;d++) p.porDia[d].forEach(function(it){ totalOcc++; var key=state.rotSemana+"-"+it.tarea.id+"-"+d; if(state.checks[key]&&state.checks[key].done)hechos++; });
    var ratio=totalOcc>0?hechos/totalOcc:0.5;
    var pag=state.cuentas.length>0?state.cuentas.filter(function(c){return c.pagado;}).length/state.cuentas.length:0.5;
    var ah=state.ahorros.some(function(a){return a.estado==="aprobado";})?1:0.4;
    var score=Math.round((ratio*0.5+pag*0.3+ah*0.2)*100); var r;
    if(score>=75)r={estado:"Feliz",frase:"¡La casa va de maravilla!",cara:"feliz",sem:"success"};
    else if(score>=45)r={estado:"Contento",frase:"Vamos bien, sigamos así.",cara:"ok",sem:"info"};
    else if(score>=25)r={estado:"Pensativo",frase:"Hay cosas pendientes.",cara:"neutral",sem:"warning"};
    else r={estado:"Triste",frase:"La casa necesita cariño y orden.",cara:"triste",sem:"danger"};
    r.score=score; return r;
  }

    var h='<div class="card soft"><div class="row" style="align-items:center;flex-wrap:wrap;gap:14px;"><div>'+svgMascota(m,animo.cara,130)+'</div><div class="grow" style="min-width:150px;"><div style="font-size:17px;font-weight:600;">'+esc(MASCOTAS[m.tipo])+' de '+esc(currentUser)+'</div><div class="row" style="gap:8px;margin:6px 0;"><span class="pill" style="background:var(--'+animo.sem+'-bg);color:var(--'+animo.sem+');">'+animo.estado+'</span><span class="muted">'+animo.frase+'</span></div><div class="bar big" style="margin:8px 0;"><div style="width:'+animo.score+'%;background:var(--'+animo.sem+');"></div></div><p class="muted">El ánimo sube con tareas, cuentas pagadas y ahorro. Tienes <b style="color:var(--warning);">'+saldo+' puntos</b>.</p></div></div></div>';
    h+='<div class="sec-title">🌗 Temas</div><div class="card soft"><p class="muted" style="margin:0 0 8px;">Elige el aspecto de la app. <b style="color:var(--success);">El modo oscuro es gratis</b> 🎉</p>'+
      '<div class="seg" style="display:flex;width:100%;">'+
        '<button id="tmAuto" class="'+(tema==="auto"?"on":"")+'" style="flex:1;">🔄 Auto</button>'+
        '<button id="tmLight" class="'+(tema==="light"?"on":"")+'" style="flex:1;">☀️ Claro</button>'+
        '<button id="tmDark" class="'+(tema==="dark"?"on":"")+'" style="flex:1;">🌙 Oscuro</button>'+
      '</div><p class="muted" style="margin:8px 0 0;font-size:12px;">«Auto» sigue el modo de tu teléfono.</p></div>';
    h+='<div class="sec-title">🎨 Color (gratis)</div><div class="card soft"><div class="row" style="flex-wrap:wrap;gap:8px;">';
    COLORES.forEach(function(c){ h+='<button class="colorbtn '+(m.color===c?"on":"")+'" data-col="'+c+'" style="background:'+c+';"></button>'; });
    h+='</div></div><div class="sec-title">🎁 Tienda — accesorios</div><p class="muted" style="margin-bottom:8px;">Compra con puntos. Lo desbloqueado queda tuyo.</p>';
    h+=shopGroup("Gorros","gorro",GORROS,m)+shopGroup("Gafas","gafas",GAFAS,m)+shopGroup("Fondos","fondo",FONDOS,m);
    h+='<div class="sec-title">🐾 Otras mascotas</div><div class="shopgrid">';
    Object.keys(MASCOTAS).forEach(function(tipo){ var precio=tipo==="gato"?0:(PRECIOS.mascota[tipo]||300),owned=tipo==="gato"||m.owned.indexOf("mascota:"+tipo)>=0,act=m.tipo===tipo,demo={tipo:tipo,color:m.color,gorro:"none",gafas:"none",fondo:"plain"};
      h+='<div class="shop '+(owned?"owned":"")+'" data-masc="'+tipo+'"><div style="display:flex;justify-content:center;">'+svgMascota(demo,"ok",64)+'</div><div style="font-weight:600;font-size:13px;margin-top:4px;">'+esc(MASCOTAS[tipo])+'</div><div class="muted" style="color:var(--'+(act?"success":owned?"text2":"warning")+');">'+(act?"En uso":owned?"Tienes — usar":precio+" pts")+'</div></div>'; });
    h+='</div>';
    content.innerHTML=h;
    var tmA=document.getElementById("tmAuto"); if(tmA)tmA.onclick=function(){ setTema("auto"); render(); };
    var tmL=document.getElementById("tmLight"); if(tmL)tmL.onclick=function(){ setTema("light"); render(); };
    var tmD=document.getElementById("tmDark"); if(tmD)tmD.onclick=function(){ setTema("dark"); render(); };
    Array.prototype.forEach.call(content.querySelectorAll("[data-col]"),function(b){ b.onclick=function(){ m.color=b.getAttribute("data-col"); save(); render(); }; });
    Array.prototype.forEach.call(content.querySelectorAll("[data-buy]"),function(b){ b.onclick=function(){ var parts=b.getAttribute("data-buy").split("|"),cat=parts[0],val=parts[1],key=cat+":"+val; var precio=val==="none"?0:((PRECIOS[cat]&&PRECIOS[cat][val]!==undefined)?PRECIOS[cat][val]:0); var owned=val==="none"||m.owned.indexOf(key)>=0;
      if(owned){ m[cat]=val; save(); render(); } else if(saldo>=precio){ state.puntos[currentUser]=saldo-precio; m.owned.push(key); m[cat]=val; save(); render(); } else setStatus("Te faltan "+(precio-saldo)+" puntos"); }; });
    Array.prototype.forEach.call(content.querySelectorAll("[data-masc]"),function(b){ b.onclick=function(){ var tipo=b.getAttribute("data-masc"),key="mascota:"+tipo,owned=tipo==="gato"||m.owned.indexOf(key)>=0,precio=tipo==="gato"?0:(PRECIOS.mascota[tipo]||300);
      if(owned){ m.tipo=tipo; save(); render(); } else if(saldo>=precio){ state.puntos[currentUser]=saldo-precio; m.owned.push(key); m.tipo=tipo; save(); render(); } else setStatus("Te faltan "+(precio-saldo)+" puntos"); }; });
  }
  function shopGroup(titulo,cat,catalogo,m){
    var saldo=pts(currentUser);
    var h='<p class="muted" style="margin:10px 0 6px;">'+titulo+'</p><div class="shopgrid">';
    Object.keys(catalogo).forEach(function(val){ var key=cat+":"+val,precio=val==="none"?0:((PRECIOS[cat]&&PRECIOS[cat][val]!==undefined)?PRECIOS[cat][val]:0),owned=val==="none"||m.owned.indexOf(key)>=0,act=m[cat]===val;
      var txt=act?"En uso":(owned?"Usar":precio+" pts"),col=act?"success":(owned?"text2":(saldo>=precio?"warning":"text3"));
      h+='<div class="shop '+(owned?"owned":"")+'" data-buy="'+cat+'|'+val+'"><div style="font-weight:600;font-size:13px;">'+esc(catalogo[val])+'</div><div class="muted" style="color:var(--'+col+');">'+txt+'</div></div>'; });
    h+='</div>'; return h;
  }

  function renderNotas(){
    var items=state.notas;
    var h='<div class="card soft"><label class="lbl">Nueva nota para la familia</label><textarea id="nT" rows="2" placeholder="Escribe un recado o aviso…"></textarea><button class="btn primary block" id="nAdd" style="margin-top:8px;">Publicar nota</button></div>';
    if(items.length===0) h+='<p class="empty">Aún no hay notas.</p>';
    else items.slice().reverse().forEach(function(it){ var c=colorFor(it.autor)||"info",hasM=it.autor&&state.mascota[it.autor];
      h+='<div class="card"><div class="row" style="align-items:flex-start;"><div>'+(hasM?svgMascota(masc(it.autor),"ok",38):'<div style="width:36px;height:36px;border-radius:50%;background:var(--'+c+'-bg);color:var(--'+c+');display:flex;align-items:center;justify-content:center;font-weight:600;">'+esc((it.autor||"?").slice(0,2).toUpperCase())+'</div>')+'</div><div class="grow"><div style="white-space:pre-wrap;word-break:break-word;">'+esc(it.texto)+'</div><div class="muted" style="margin-top:4px;">'+esc(it.autor||"—")+' · '+esc(it.fecha||"")+'</div></div><button class="del" data-del="'+it.id+'">🗑️</button></div></div>'; });
    content.innerHTML=h;
    document.getElementById("nAdd").onclick=function(){ var t=document.getElementById("nT").value.trim(); if(!t)return; state.notas.push({id:uid(),texto:t,autor:currentUser,fecha:new Date().toLocaleString("es-CL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}); save(); render(); };
    Array.prototype.forEach.call(content.querySelectorAll("[data-del]"),function(b){ b.onclick=function(){ state.notas=state.notas.filter(function(x){return x.id!==b.getAttribute("data-del");}); save(); render(); }; });
  }

  // ====== CIERRE MENSUAL ======
  function abbrevPeso(n){
    if(n>=1000000) return '$'+(Math.round(n/100000)/10)+'M';
    if(n>=1000) return '$'+(Math.round(n/1000))+'K';
    return '$'+Math.round(n);
  }

  function buildBarChart(calc, ahorroPP){
    var us=state.usuarios;
    if(us.length===0) return '<p class="empty">Sin datos.</p>';
    var barColors=["#EF9F27","#888780","#85B7EB","#ED93B1","#97C459","#AFA9EC","#F0997B"];
    var svgW=Math.max(260, us.length*100+60);
    var svgH=160;
    var pt={top:12,bottom:32,left:46,right:10};
    var cW=svgW-pt.left-pt.right;
    var cH=svgH-pt.top-pt.bottom;
    var maxVal=1;
    us.forEach(function(u){ var r=calc.res[u]||{}; maxVal=Math.max(maxVal,r.aporte||0,ahorroPP[u]||0); });
    var groupW=cW/us.length;
    var barW=Math.min(22,groupW*0.38);
    var svg='<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible;">';
    // grid lines
    for(var i=0;i<=3;i++){
      var gy=pt.top+cH-(cH*i/3);
      svg+='<line x1="'+(pt.left-4)+'" y1="'+gy+'" x2="'+(svgW-pt.right)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="0.5"/>';
      if(i>0) svg+='<text x="'+(pt.left-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="8" fill="var(--text3)">'+abbrevPeso(maxVal*i/3)+'</text>';
    }
    us.forEach(function(u,i){
      var r=calc.res[u]||{};
      var gasto=r.aporte||0, ahorro=ahorroPP[u]||0;
      var col=barColors[i%barColors.length];
      var cx=pt.left+i*groupW+groupW/2;
      var gH=(gasto/maxVal)*cH, aH=(ahorro/maxVal)*cH;
      var baseY=pt.top+cH;
      svg+='<rect x="'+(cx-barW-2)+'" y="'+(baseY-gH)+'" width="'+barW+'" height="'+Math.max(2,gH)+'" fill="'+col+'" rx="2" opacity="0.9"/>';
      svg+='<rect x="'+(cx+2)+'" y="'+(baseY-aH)+'" width="'+barW+'" height="'+Math.max(2,aH)+'" fill="#1d9e75" rx="2" opacity="0.85"/>';
      var dn=u.length>8?u.slice(0,8)+'…':u;
      svg+='<text x="'+cx+'" y="'+(baseY+18)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+esc(dn)+'</text>';
    });
    svg+='<line x1="'+pt.left+'" y1="'+pt.top+'" x2="'+pt.left+'" y2="'+(pt.top+cH)+'" stroke="var(--border2)" stroke-width="1"/>';
    svg+='<line x1="'+pt.left+'" y1="'+(pt.top+cH)+'" x2="'+(svgW-pt.right)+'" y2="'+(pt.top+cH)+'" stroke="var(--border2)" stroke-width="1"/>';
    svg+='</svg>';
    return svg;
  }

  function renderCierre(){
    var calc=calcularAportes();
    var aprobados=state.ahorros.filter(function(a){return a.estado==="aprobado";});
    var ahorroTotal=aprobados.reduce(function(s,a){return s+(+a.monto||0);},0);
    var ahorroPP={}; state.usuarios.forEach(function(u){ahorroPP[u]=0;});
    aprobados.forEach(function(a){ if(ahorroPP[a.autor]!==undefined) ahorroPP[a.autor]+=(+a.monto||0); });
    var now=new Date();
    var mesAnio=now.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
    var mesLabel=mesAnio.charAt(0).toUpperCase()+mesAnio.slice(1);

    var h='<div class="sec-title">📊 Cierre mensual</div>';
    h+='<p class="muted" style="margin-bottom:12px;">'+esc(mesLabel)+'</p>';
    h+='<div class="metrics">';
    h+='<div class="metric"><div class="l">Total gastos</div><div class="v">'+PESO(calc.gasto)+'</div></div>';
    h+='<div class="metric"><div class="l">Ahorro validado</div><div class="v" style="color:var(--success);">'+PESO(ahorroTotal)+'</div></div>';
    h+='<div class="metric"><div class="l">💵 Cuentas</div><div class="v">'+PESO(calc.cuentasTotal)+'</div></div>';
    h+='<div class="metric"><div class="l">🛒 Despensa</div><div class="v">'+PESO(calc.despensaTotal)+'</div></div>';
    h+='</div>';

    if(state.usuarios.length>0){
      h+='<div class="card" style="overflow-x:auto;">';
      h+='<div style="font-weight:600;margin-bottom:10px;">Gastos y ahorro por persona</div>';
      h+=buildBarChart(calc,ahorroPP);
      h+='<div style="display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--text2);">';
      h+='<span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;background:#EF9F27;border-radius:2px;display:inline-block;"></span>Gastos</span>';
      h+='<span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;background:#1d9e75;border-radius:2px;display:inline-block;"></span>Ahorro</span>';
      h+='</div></div>';

      h+='<div class="sec-title">Desglose por persona</div>';
      state.usuarios.forEach(function(u){
        var c=colorFor(u), r=calc.res[u]||{sueldo:0,aporte:0,queda:0};
        h+='<div class="card"><div class="row" style="justify-content:space-between;margin-bottom:6px;">';
        h+='<span class="pill" style="background:var(--'+c+'-bg);color:var(--'+c+');">'+esc(u)+'</span>';
        h+='<span class="muted">Sueldo: '+PESO(r.sueldo||0)+'</span></div>';
        h+='<div class="grid2">';
        h+='<div class="metric" style="padding:7px 9px;"><div class="muted">💸 Aporte gastos</div><div style="font-weight:600;">'+PESO(r.aporte||0)+'</div></div>';
        h+='<div class="metric" style="padding:7px 9px;"><div class="muted">🐷 Ahorro</div><div style="font-weight:600;color:var(--success);">'+PESO(ahorroPP[u]||0)+'</div></div>';
        h+='</div>';
        h+='<div style="font-size:13px;margin-top:6px;">Queda libre: <b style="color:var(--success);">'+PESO(r.queda||0)+'</b></div>';
        h+='</div>';
      });
    } else {
      h+='<p class="empty">Agrega integrantes para ver el cierre.</p>';
    }

    h+='<div class="card soft" style="margin-top:8px;">';
    h+='<div style="font-weight:600;margin-bottom:6px;">📊 Resumen del mes</div>';
    h+='<p class="muted" style="margin:0 0 10px;">Mira el resumen completo en pantalla: cuentas, despensa, ahorro y saldo libre. Puedes copiarlo y pegarlo donde quieras (WhatsApp, notas, Excel).</p>';
    h+='<button class="btn primary block" id="verResumenBtn" style="margin-bottom:8px;">👁️ Ver resumen en pantalla</button>';
    h+='<button class="btn ok block" id="copiarBtn" style="margin-bottom:8px;">📋 Copiar resumen</button>';
    h+='<button class="btn block" id="csvBtn">⬇️ Descargar como CSV (Excel)</button>';
    h+='<div id="resumenBox" style="display:none;margin-top:10px;"></div>';
    h+='</div>';

    content.innerHTML=h;
    var vr=document.getElementById("verResumenBtn");
    if(vr) vr.onclick=verResumenPantalla;
    var cp=document.getElementById("copiarBtn");
    if(cp) cp.onclick=copiarResumen;
    var cv=document.getElementById("csvBtn");
    if(cv) cv.onclick=descargarCSV;
  }

  // ====== RESUMEN EN TEXTO (base para mostrar/copiar/CSV) ======
  function generarResumenTexto(sep){
    sep=sep||"\t";
    var calc=calcularAportes();
    var aprobados=state.ahorros.filter(function(a){return a.estado==="aprobado";});
    var ahorroTotal=aprobados.reduce(function(s,a){return s+(+a.monto||0);},0);
    var ahorroPP={}; state.usuarios.forEach(function(u){ahorroPP[u]=0;});
    aprobados.forEach(function(a){ if(ahorroPP[a.autor]!==undefined) ahorroPP[a.autor]+=(+a.monto||0); });
    var now=new Date();
    var mesAnio=now.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
    var mesLabel=mesAnio.charAt(0).toUpperCase()+mesAnio.slice(1);

    var L=[];
    L.push("RESUMEN MENSUAL — NUESTRO HOGAR");
    L.push("Mes: "+mesLabel);
    L.push("");
    L.push("GASTOS DEL HOGAR");
    L.push(["Concepto","Total"].join(sep));
    L.push(["Cuentas", Math.round(calc.cuentasTotal)].join(sep));
    L.push(["Despensa", Math.round(calc.despensaTotal)].join(sep));
    L.push(["TOTAL GASTOS", Math.round(calc.gasto)].join(sep));
    L.push("");
    L.push("SALDO POR PERSONA");
    L.push(["Persona","Sueldo","Aporte gastos","Ahorro","Libre"].join(sep));
    state.usuarios.forEach(function(u){
      var r=calc.res[u]||{sueldo:0,aporte:0,queda:0};
      L.push([u, r.sueldo||0, Math.round(r.aporte||0), ahorroPP[u]||0, Math.round(r.queda||0)].join(sep));
    });
    L.push("");
    L.push("FONDO DE AHORRO COMÚN");
    state.usuarios.forEach(function(u){ L.push([u, ahorroPP[u]||0].join(sep)); });
    L.push(["TOTAL AHORRO", ahorroTotal].join(sep));
    return L.join("\n");
  }

  function verResumenPantalla(){
    var box=document.getElementById("resumenBox");
    if(!box) return;
    if(box.style.display==="block"){ box.style.display="none"; return; }
    var txt=generarResumenTexto("\t");
    var rows=txt.split("\n").map(function(line){
      if(line==="") return '<tr><td style="padding:3px 0;">&nbsp;</td></tr>';
      var cells=line.split("\t");
      if(cells.length===1){
        return '<tr><td colspan="5" style="font-weight:700;padding:6px 0 2px;color:var(--info);">'+esc(cells[0])+'</td></tr>';
      }
      return '<tr>'+cells.map(function(c){
        var num=/^-?\d+$/.test(c);
        return '<td style="padding:3px 8px 3px 0;'+(num?'text-align:right;font-variant-numeric:tabular-nums;':'')+'">'+esc(num?PESO(+c):c)+'</td>';
      }).join('')+'</tr>';
    }).join('');
    box.innerHTML='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">'+rows+'</table></div>';
    box.style.display="block";
  }

  function copiarResumen(){
    var txt=generarResumenTexto("\t");
    function ok(){ setStatus("Resumen copiado ✓ — pégalo donde quieras","on"); }
    function fail(){
      // Respaldo: mostrar en pantalla para copiar a mano
      verResumenPantalla();
      setStatus("Copia manual: selecciona el texto de abajo","on");
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(ok).catch(fail);
    } else {
      try {
        var ta=document.createElement("textarea");
        ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta); ok();
      } catch(e){ fail(); }
    }
  }

  function descargarCSV(){
    var now=new Date();
    var mesAnio=now.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
    var filename="NuestroHogar_"+mesAnio.replace(/\s+/g,"_")+".csv";
    // BOM para que Excel respete los acentos
    var txt="\uFEFF"+generarResumenTexto(",");
    var blob=new Blob([txt],{type:"text/csv;charset=utf-8;"});
    var esIOS=/iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
    var url=URL.createObjectURL(blob);
    if(esIOS){
      window.open(url,"_blank");
      setStatus("CSV abierto en pestaña nueva → Compartir → Guardar","on");
    } else {
      var a=document.createElement("a");
      a.href=url; a.download=filename;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
      setStatus("CSV descargado ✓ (se abre en Excel)","on");
    }
  }

  aplicarTema();
  iniciar();
})();
</script>
