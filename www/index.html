<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1d9e75">
<title>Nuestro Hogar</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231d9e75'/%3E%3Ctext x='50' y='68' font-size='56' text-anchor='middle' fill='white'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#f5f4ef;--surface:#ffffff;--surface2:#f0eee7;--surface3:#e7e4da;
    --text:#2c2c2a;--text2:#5f5e5a;--text3:#888780;--border:#e2dfd6;--border2:#cfccc2;
    --info-bg:#e6f1fb;--info:#185fa5;--success-bg:#e1f5ee;--success:#0f6e56;
    --warning-bg:#faeeda;--warning:#854f0b;--danger-bg:#fcebeb;--danger:#a32d2d;
    --radius:10px;--radius-lg:14px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;-webkit-text-size-adjust:100%;}
  body{padding-bottom:84px;}
  input,select,textarea,button{font-family:inherit;font-size:16px;}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);}
  textarea{resize:vertical;}
  button{cursor:pointer;}
  .topbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:600;}
  .brand .ico{font-size:22px;}
  .right{display:flex;align-items:center;gap:8px;}
  .pts{display:none;align-items:center;gap:4px;font-size:13px;background:var(--warning-bg);color:var(--warning);padding:4px 10px;border-radius:var(--radius);font-weight:600;}
  select.user{width:auto;padding:6px 8px;font-size:14px;max-width:130px;}
  .status{font-size:12px;color:var(--text3);padding:4px 14px;min-height:14px;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex:none;}
  .dot.on{background:#1d9e75;} .dot.off{background:#d85a30;}
  .wrap{padding:8px 14px 20px;max-width:680px;margin:0 auto;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:9px;}
  .card.soft{background:var(--surface2);border-color:transparent;}
  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px;}
  .metric{background:var(--surface2);border-radius:var(--radius);padding:11px 13px;}
  .metric .l{font-size:12px;color:var(--text2);margin-bottom:3px;}
  .metric .v{font-size:21px;font-weight:600;}
  .lbl{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;}
  .field{margin-bottom:8px;}
  .btn{padding:9px 13px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:6px;justify-content:center;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--info-bg);color:var(--info);border-color:transparent;}
  .btn.ok{background:var(--success-bg);color:var(--success);border-color:transparent;}
  .btn.no{background:var(--danger-bg);color:var(--danger);border-color:transparent;}
  .btn.block{width:100%;}
  .row{display:flex;align-items:center;gap:10px;}
  .grow{flex:1;min-width:0;}
  .pill{font-size:12px;padding:3px 9px;border-radius:var(--radius);font-weight:600;display:inline-flex;align-items:center;gap:4px;}
  .del{background:none;border:none;color:var(--text3);font-size:18px;padding:4px;}
  .bar{height:9px;background:var(--surface3);border-radius:6px;overflow:hidden;display:flex;}
  .bar.big{height:13px;}
  .muted{font-size:12px;color:var(--text3);}
  .sec-title{font-size:15px;font-weight:600;margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
  .seg{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
  .seg button{border:none;padding:7px 13px;font-size:13px;background:transparent;color:var(--text);}
  .seg button.on{background:var(--info-bg);color:var(--info);font-weight:600;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;}
  .smallinput{width:auto;padding:7px 9px;font-size:14px;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .day{background:var(--surface2);border-radius:8px;padding:6px 4px;min-height:54px;}
  .dayn{font-size:10px;color:var(--text3);text-transform:uppercase;text-align:center;margin-bottom:4px;letter-spacing:.5px;}
  .chip{font-size:10px;padding:4px 5px;border-radius:6px;margin-bottom:4px;line-height:1.25;display:flex;gap:4px;align-items:flex-start;}
  .check{width:16px;height:16px;flex:none;border-radius:50%;border:1.5px solid currentColor;background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;color:inherit;padding:0;}
  .check.done{background:var(--success);border-color:var(--success);color:#fff;}
  .daybtn{font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);}
  .daybtn.on{background:var(--info-bg);color:var(--info);border-color:transparent;font-weight:600;}
  .shopgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;}
  .shop{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;}
  .shop.owned{border-color:var(--success);}
  .colorbtn{width:32px;height:32px;border-radius:50%;border:2px solid transparent;}
  .colorbtn.on{outline:2px solid var(--info);outline-offset:2px;}
  .floatp{position:absolute;font-size:13px;font-weight:700;color:var(--success);pointer-events:none;animation:fp 1.4s ease-out forwards;z-index:5;}
  @keyframes fp{0%{opacity:0;transform:translateY(6px);}20%{opacity:1;}100%{opacity:0;transform:translateY(-20px);}}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);border-top:1px solid var(--border);display:flex;overflow-x:auto;padding:6px 4px;gap:2px;}
  .nav::-webkit-scrollbar{display:none;}
  .nav button{flex:0 0 auto;border:none;background:transparent;color:var(--text3);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:8px;min-width:56px;}
  .nav button .ni{font-size:20px;line-height:1;}
  .nav button.on{color:var(--info);background:var(--info-bg);}
  .empty{text-align:center;color:var(--text3);font-size:14px;padding:18px 8px;}
  .setup{max-width:520px;margin:0 auto;padding:24px 18px;}
  .setup h1{font-size:24px;margin:0 0 6px;}
  .setup .step{font-size:13px;color:var(--success);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:18px;}
  @media (prefers-color-scheme:dark){
    :root{--bg:#1c1b19;--surface:#262521;--surface2:#2f2e2a;--surface3:#3a3833;
      --text:#f1efe8;--text2:#b4b2a9;--text3:#888780;--border:#3a3833;--border2:#48463f;
      --info-bg:#0c447c;--info:#b5d4f4;--success-bg:#085041;--success:#9fe1cb;
      --warning-bg:#633806;--warning:#fac775;--danger-bg:#791f1f;--danger:#f7c1c1;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
(function(){
  "use strict";

  // ====== CONFIG DE CONEXIÓN (se guarda en este teléfono) ======
  var CFG_KEY="nh_config_v1";
  function getCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY))||null; }catch(e){ return null; } }
  function setCfg(c){ localStorage.setItem(CFG_KEY,JSON.stringify(c)); }
  function clearCfg(){ localStorage.removeItem(CFG_KEY); }

  var PALETTE=["info","success","warning","danger"];
  function PESO(n){return "$"+Math.round(n).toLocaleString("es-CL");}
  function PCT(n){return (Math.round(n*10)/10).toLocaleString("es-CL")+"%";}
  var DIAS=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  var NIVELES={1:{nombre:"Ligera",min:10,pts:5},2:{nombre:"Media",min:30,pts:10},3:{nombre:"Pesada",min:75,pts:20}};
  var GORROS={none:"Ninguno",cap:"Gorrito",crown:"Corona",party:"Fiesta",bow:"Moñito"};
  var GAFAS={none:"Ninguna",round:"Redondas",sun:"De sol"};
  var FONDOS={plain:"Liso",ring:"Aro",dots:"Puntitos"};
  var MASCOTAS={gato:"Gatito",perro:"Perrito",conejo:"Conejito"};
  var PRECIOS={gorro:{cap:60,crown:200,party:120,bow:80},gafas:{round:70,sun:110},fondo:{ring:50,dots:90},mascota:{perro:300,conejo:300}};
  var COLORES=["#EF9F27","#888780","#85B7EB","#ED93B1","#97C459","#AFA9EC","#F0997B"];
  var TABS=[
    {id:"integrantes",ic:"👥",t:"Familia"},{id:"cuentas",ic:"💵",t:"Cuentas"},{id:"aporte",ic:"⚖️",t:"Aporte"},
    {id:"despensa",ic:"🛒",t:"Despensa"},{id:"metas",ic:"🎯",t:"Metas"},{id:"quehaceres",ic:"📅",t:"Tareas"},
    {id:"mascota",ic:"🐾",t:"Mascota"},{id:"notas",ic:"📝",t:"Notas"},{id:"cierre",ic:"📊",t:"Cierre"},{id:"ajustes",ic:"⚙️",t:"Ajustes"}
  ];

  var DEFAULT={usuarios:[],sueldos:{},minimos:{},metodo:"minimo",cuentas:[],despensa:[],notas:[],tareas:[],rotSemana:0,metas:[],ahorros:[],topePesada:3,checks:{},puntos:{},mascota:{}};
  var state=JSON.parse(JSON.stringify(DEFAULT));
  var currentUser=null, activeTab="integrantes";
  var sb=null, hogar=null, conectado=false, guardando=false, ultimoGuardado="";
  var root=document.getElementById("root");

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m];}); }
  function adminUser(){ return state.usuarios[0]||null; }
  function esAdmin(){ return currentUser&&currentUser===adminUser(); }
  function colorFor(u){ var i=state.usuarios.indexOf(u); return PALETTE[i%PALETTE.length]||"info"; }
  function pesoNivel(n){ return NIVELES[n||2].min; }
  function pts(u){ return state.puntos[u]||0; }
  function masc(u){ if(!state.mascota[u]) state.mascota[u]={tipo:"gato",color:COLORES[0],gorro:"none",gafas:"none",fondo:"plain",owned:[]}; return state.mascota[u]; }
  function darPuntos(u,n){ state.puntos[u]=(state.puntos[u]||0)+n; }

  // ====== PANTALLA DE CONFIGURACIÓN ======
  function renderSetup(msg){
    root.innerHTML='<div class="setup">'+
      '<h1>🏠 Nuestro Hogar</h1>'+
      '<p class="muted" style="font-size:15px;">Conecta esta app a tu hogar compartido. Solo lo haces una vez en este teléfono. Si no tienes los datos aún, abre la guía que te entregaron.</p>'+
      (msg?'<div class="card" style="background:var(--danger-bg);color:var(--danger);border:none;">'+esc(msg)+'</div>':'')+
      '<div class="step">Paso 1 · Datos de tu Supabase</div>'+
      '<div class="field" style="margin-top:8px;"><label class="lbl">Project URL (dirección)</label><input id="cfgUrl" placeholder="https://xxxxx.supabase.co"></div>'+
      '<div class="field"><label class="lbl">API Key anon public (clave larga)</label><textarea id="cfgKey" rows="3" placeholder="eyJhbGciOi..."></textarea></div>'+
      '<div class="step">Paso 2 · Tu hogar</div>'+
      '<div class="field" style="margin-top:8px;"><label class="lbl">Código de hogar (invéntalo, y úsenlo los tres iguales)</label><input id="cfgHogar" placeholder="ej: casacoronel2026"></div>'+
      '<button class="btn primary block" id="cfgGo" style="margin-top:14px;">Conectar mi hogar</button>'+
      '<p class="muted" style="margin-top:14px;">El código de hogar es la “llave” que comparten los tres para ver lo mismo. Escríbanlo idéntico (sin mayúsculas ni espacios).</p>'+
    '</div>';
    document.getElementById("cfgGo").onclick=function(){
      var url=document.getElementById("cfgUrl").value.trim();
      var key=document.getElementById("cfgKey").value.trim();
      var hg=document.getElementById("cfgHogar").value.trim().toLowerCase().replace(/[^a-z0-9]/g,"");
      if(!url||!key||!hg){ renderSetup("Completa los tres campos."); return; }
      if(url.indexOf("http")!==0){ renderSetup("La dirección debe empezar con https://"); return; }
      setCfg({url:url,key:key,hogar:hg});
      iniciar();
    };
  }

  // ====== CONEXIÓN SUPABASE ======
  function iniciar(){
    var cfg=getCfg();
    if(!cfg){ renderSetup(); return; }
    if(typeof supabase==="undefined"){ renderSetup("No se pudo cargar la librería de conexión. Revisa tu internet y recarga."); return; }
    hogar=cfg.hogar;
    try{ sb=supabase.createClient(cfg.url,cfg.key); }
    catch(e){ renderSetup("Los datos de conexión no son válidos. Revísalos."); return; }
    arrancarApp();
  }

  function arrancarApp(){
    root.innerHTML=''+
      '<div class="topbar"><div class="brand"><span class="ico">🏠</span><span>Nuestro Hogar</span></div>'+
      '<div class="right"><span class="pts" id="ptsChip">✨ <span id="ptsVal">0</span></span><select class="user" id="userSel"></select></div></div>'+
      '<div class="status" id="status"><span class="dot" id="connDot"></span><span id="statusTxt">Conectando…</span></div>'+
      '<div class="wrap"><div id="content"></div></div>'+
      '<nav class="nav" id="nav"></nav>';
    cargarYsuscribir();
  }

  function setStatus(txt,estado){
    var t=document.getElementById("statusTxt"); if(t)t.textContent=txt;
    var d=document.getElementById("connDot"); if(d){ d.className="dot"+(estado==="on"?" on":estado==="off"?" off":""); }
  }

  function cargarYsuscribir(){
    setStatus("Cargando datos del hogar…");
    sb.from("hogares").select("data").eq("id",hogar).single().then(function(res){
      if(res.error && res.error.code==="PGRST116"){
        // no existe: lo creamos vacío
        sb.from("hogares").insert({id:hogar,data:DEFAULT}).then(function(r2){
          if(r2.error){ conError(r2.error); return; }
          state=JSON.parse(JSON.stringify(DEFAULT)); conectado=true; setStatus("Conectado · hogar nuevo","on"); render(); suscribir();
        });
      } else if(res.error){ conError(res.error); }
      else { state=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),res.data.data||{}); conectado=true; setStatus("Conectado","on"); render(); suscribir(); }
    });
  }
  function conError(err){
    var msg=(err&&err.message)?err.message:"Error de conexión";
    if(msg.indexOf("relation")>=0 || msg.indexOf("does not exist")>=0) msg="Falta crear la tabla en Supabase. Revisa el paso de la guía sobre la tabla 'hogares'.";
    if(msg.indexOf("JWT")>=0 || msg.indexOf("apikey")>=0 || msg.indexOf("Invalid")>=0) msg="La clave o la dirección no son correctas. Revísalas en Ajustes.";
    setStatus("Sin conexión","off");
    var c=document.getElementById("content");
    if(c) c.innerHTML='<div class="card" style="background:var(--danger-bg);color:var(--danger);border:none;"><b>No se pudo conectar.</b><br>'+esc(msg)+'</div><button class="btn block" id="reintentar" style="margin-top:8px;">Reintentar</button><button class="btn block" id="reconfig" style="margin-top:8px;">Cambiar datos de conexión</button>';
    var r=document.getElementById("reintentar"); if(r)r.onclick=cargarYsuscribir;
    var rc=document.getElementById("reconfig"); if(rc)rc.onclick=function(){ clearCfg(); renderSetup(); };
  }

  var saveTimer=null;
  function save(){
    // refresco optimista local + guardado en la nube con pequeño debounce
    if(!conectado||!sb){ return; }
    setStatus("Guardando…","on");
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      sb.from("hogares").update({data:state, updated_at:new Date().toISOString()}).eq("id",hogar).then(function(res){
        if(res.error){ setStatus("Error al guardar","off"); }
        else { ultimoGuardado=new Date().toLocaleTimeString("es-CL"); setStatus("Guardado · "+ultimoGuardado,"on"); }
      });
    },350);
  }

  function suscribir(){
    try{
      sb.channel("hogar-"+hogar)
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"hogares",filter:"id=eq."+hogar},function(payload){
          if(guardando) return;
          var nuevo=payload.new&&payload.new.data;
          if(nuevo){ state=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),nuevo); render(); setStatus("Actualizado por la familia · "+new Date().toLocaleTimeString("es-CL"),"on"); }
        }).subscribe();
    }catch(e){}
  }

  var content, sel;
  function getEls(){ content=document.getElementById("content"); sel=document.getElementById("userSel"); }

  function fillUserSel(){
    sel.innerHTML="";
    if(state.usuarios.length===0){ var o=document.createElement("option"); o.textContent="(sin familia)"; o.value=""; sel.appendChild(o); currentUser=null; return; }
    state.usuarios.forEach(function(u){ var op=document.createElement("option"); op.value=u; op.textContent=u+(u===adminUser()?" (admin)":""); sel.appendChild(op); });
    if(!currentUser||state.usuarios.indexOf(currentUser)<0) currentUser=state.usuarios[0];
    sel.value=currentUser;
  }
  function updatePts(){ var chip=document.getElementById("ptsChip"); if(currentUser){ chip.style.display="inline-flex"; document.getElementById("ptsVal").textContent=pts(currentUser); } else chip.style.display="none"; }
  function buildNav(){
    var nav=document.getElementById("nav"); nav.innerHTML="";
    TABS.forEach(function(tab){ var b=document.createElement("button"); b.className=activeTab===tab.id?"on":""; b.innerHTML='<span class="ni">'+tab.ic+'</span>'+tab.t;
      b.onclick=function(){ activeTab=tab.id; render(); var w=document.querySelector(".wrap"); if(w)w.scrollIntoView({block:"start"}); }; nav.appendChild(b); });
  }

  function calcularAportes(){
    var cT=state.cuentas.reduce(function(s,i){return s+(+i.monto||0);},0);
    var dT=state.despensa.reduce(function(s,i){return s+(+i.monto||0);},0);
    var gasto=cT+dT, us=state.usuarios;
    function sueldo(u){return +state.sueldos[u]||0;} function minimo(u){return +state.minimos[u]||0;}
    var ingresoTotal=us.reduce(function(s,u){return s+sueldo(u);},0);
    var base={},baseTotal=0;
    if(state.metodo==="proporcional"){ us.forEach(function(u){base[u]=sueldo(u);}); baseTotal=ingresoTotal; }
    else { us.forEach(function(u){base[u]=Math.max(0,sueldo(u)-minimo(u));}); baseTotal=us.reduce(function(s,u){return s+base[u];},0); }
    var res={};
    us.forEach(function(u){ var frac=baseTotal>0?base[u]/baseTotal:1/us.length; var aC=cT*frac,aD=dT*frac,ap=aC+aD;
      res[u]={sueldo:sueldo(u),minimo:minimo(u),aporte:ap,aCuentas:aC,aDespensa:aD,queda:sueldo(u)-ap,parte:frac*100}; });
    return {gasto:gasto,cuentasTotal:cT,despensaTotal:dT,ingresoTotal:ingresoTotal,baseTotal:baseTotal,res:res,sinExcedente:state.metodo==="minimo"&&baseTotal===0};
  }
  function ocurrencias(){ var occ=[]; state.tareas.forEach(function(t){ var dias=t.freq==="diario"?[0,1,2,3,4,5,6]:(t.dias||[]).slice(); if(dias.length===0)dias=[0]; dias.forEach(function(d){occ.push({tarea:t,dia:d});}); }); return occ; }
  function planSemana(semana){
    var us=state.usuarios,n=us.length,porDia=[]; for(var i=0;i<7;i++)porDia.push([]);
    var carga={},vecesPesada={}; us.forEach(function(u){carga[u]=0;vecesPesada[u]=0;}); var avisoTope=false;
    var occ=ocurrencias().sort(function(a,b){return pesoNivel(b.tarea.nivel)-pesoNivel(a.tarea.nivel);});
    occ.forEach(function(o,oi){ var esP=(o.tarea.nivel||2)===3; var orden=[]; for(var k=0;k<n;k++)orden.push(us[(k+semana+oi)%n]);
      orden.sort(function(a,b){return carga[a]-carga[b];}); var el;
      if(esP){ el=null; for(var j=0;j<orden.length;j++){ if(vecesPesada[orden[j]]<state.topePesada){el=orden[j];break;} } if(!el){el=orden[0];avisoTope=true;} } else el=orden[0];
      porDia[o.dia].push({tarea:o.tarea,user:el}); carga[el]+=pesoNivel(o.tarea.nivel); if(esP)vecesPesada[el]++; });
    return {porDia:porDia,carga:carga,vecesPesada:vecesPesada,avisoTope:avisoTope};
  }
  function animoHogar(){
    var p=planSemana(state.rotSemana); var totalOcc=0,hechos=0;
    for(var d=0;d<7;d++) p.porDia[d].forEach(function(it){ totalOcc++; var key=state.rotSemana+"-"+it.tarea.id+"-"+d; if(state.checks[key]&&state.checks[key].done)hechos++; });
    var ratio=totalOcc>0?hechos/totalOcc:0.5;
    var pag=state.cuentas.length>0?state.cuentas.filter(function(c){return c.pagado;}).length/state.cuentas.length:0.5;
    var ah=state.ahorros.some(function(a){return a.estado==="aprobado";})?1:0.4;

  function abbrevPeso(n){
    if(n>=1000000) return '$'+(Math.round(n/100000)/10)+'M';
    if(n>=1000) return '$'+(Math.round(n/1000))+'K';
    return '$'+Math.round(n);
  }

  function buildBarChart(calc, ahorroPP){
    var us=state.usuarios;
    if(us.length===0) return '<p class="empty">Sin datos.</p>';
    var barColors=["#EF9F27","#888780","#85B7EB","#ED93B1","#97C459","#AFA9EC","#F0997B"];
    var svgW=Math.max(260, us.length*100+60);
    var svgH=160;
    var pt={top:12,bottom:32,left:46,right:10};
    var cW=svgW-pt.left-pt.right;
    var cH=svgH-pt.top-pt.bottom;
    var maxVal=1;
    us.forEach(function(u){ var r=calc.res[u]||{}; maxVal=Math.max(maxVal,r.aporte||0,ahorroPP[u]||0); });
    var groupW=cW/us.length;
    var barW=Math.min(22,groupW*0.38);
    var svg='<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible;">';
    // grid lines
    for(var i=0;i<=3;i++){
      var gy=pt.top+cH-(cH*i/3);
      svg+='<line x1="'+(pt.left-4)+'" y1="'+gy+'" x2="'+(svgW-pt.right)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="0.5"/>';
      if(i>0) svg+='<text x="'+(pt.left-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="8" fill="var(--text3)">'+abbrevPeso(maxVal*i/3)+'</text>';
    }
    us.forEach(function(u,i){
      var r=calc.res[u]||{};
      var gasto=r.aporte||0, ahorro=ahorroPP[u]||0;
      var col=barColors[i%barColors.length];
      var cx=pt.left+i*groupW+groupW/2;
      var gH=(gasto/maxVal)*cH, aH=(ahorro/maxVal)*cH;
      var baseY=pt.top+cH;
      svg+='<rect x="'+(cx-barW-2)+'" y="'+(baseY-gH)+'" width="'+barW+'" height="'+Math.max(2,gH)+'" fill="'+col+'" rx="2" opacity="0.9"/>';
      svg+='<rect x="'+(cx+2)+'" y="'+(baseY-aH)+'" width="'+barW+'" height="'+Math.max(2,aH)+'" fill="#1d9e75" rx="2" opacity="0.85"/>';
      var dn=u.length>8?u.slice(0,8)+'…':u;
      svg+='<text x="'+cx+'" y="'+(baseY+18)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+esc(dn)+'</text>';
    });
    svg+='<line x1="'+pt.left+'" y1="'+pt.top+'" x2="'+pt.left+'" y2="'+(pt.top+cH)+'" stroke="var(--border2)" stroke-width="1"/>';
    svg+='<line x1="'+pt.left+'" y1="'+(pt.top+cH)+'" x2="'+(svgW-pt.right)+'" y2="'+(pt.top+cH)+'" stroke="var(--border2)" stroke-width="1"/>';
    svg+='</svg>';
    return svg;
  }

        h+='<div class="grid2">';
        h+='<div class="metric" style="padding:7px 9px;"><div class="muted">💸 Aporte gastos</div><div style="font-weight:600;">'+PESO(r.aporte||0)+'</div></div>';
        h+='<div class="metric" style="padding:7px 9px;"><div class="muted">🐷 Ahorro</div><div style="font-weight:600;color:var(--success);">'+PESO(ahorroPP[u]||0)+'</div></div>';
        h+='</div>';
        h+='<div style="font-size:13px;margin-top:6px;">Queda libre: <b style="color:var(--success);">'+PESO(r.queda||0)+'</b></div>';
        h+='</div>';
      });
    } else {
      h+='<p class="empty">Agrega integrantes para ver el cierre.</p>';
    }

    h+='<div class="card soft" style="margin-top:8px;">';
    h+='<div style="font-weight:600;margin-bottom:6px;">📊 Resumen del mes</div>';
    h+='<p class="muted" style="margin:0 0 10px;">Mira el resumen completo en pantalla: cuentas, despensa, ahorro y saldo libre. Puedes copiarlo y pegarlo donde quieras (WhatsApp, notas, Excel).</p>';
    h+='<button class="btn primary block" id="verResumenBtn" style="margin-bottom:8px;">👁️ Ver resumen en pantalla</button>';
    h+='<button class="btn ok block" id="copiarBtn" style="margin-bottom:8px;">📋 Copiar resumen</button>';
    h+='<button class="btn block" id="csvBtn" style="margin-bottom:8px;">⬇️ Descargar como CSV (Excel)</button>';
    h+='<button class="btn block" id="exportBtn">⬇️ Descargar .xlsx</button>';
    h+='<div id="resumenBox" style="display:none;margin-top:10px;"></div>';
    h+='</div>';

    content.innerHTML=h;
    var btn=document.getElementById("exportBtn");
    if(btn) btn.onclick=exportarExcel;
    var vr=document.getElementById("verResumenBtn");
    if(vr) vr.onclick=verResumenPantalla;
    var cp=document.getElementById("copiarBtn");
    if(cp) cp.onclick=copiarResumen;
    var cv=document.getElementById("csvBtn");
    if(cv) cv.onclick=descargarCSV;
  }

  // ====== RESUMEN EN TEXTO (base para mostrar/copiar/CSV) ======
  function generarResumenTexto(sep){
    sep=sep||"\t";
    var calc=calcularAportes();
    var aprobados=state.ahorros.filter(function(a){return a.estado==="aprobado";});
    var ahorroTotal=aprobados.reduce(function(s,a){return s+(+a.monto||0);},0);
    var ahorroPP={}; state.usuarios.forEach(function(u){ahorroPP[u]=0;});
    aprobados.forEach(function(a){ if(ahorroPP[a.autor]!==undefined) ahorroPP[a.autor]+=(+a.monto||0); });
    var now=new Date();
    var mesAnio=now.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
    var mesLabel=mesAnio.charAt(0).toUpperCase()+mesAnio.slice(1);

    var L=[];
    L.push("RESUMEN MENSUAL — NUESTRO HOGAR");
    L.push("Mes: "+mesLabel);
    L.push("");
    L.push("GASTOS DEL HOGAR");
    L.push(["Concepto","Total"].join(sep));
    L.push(["Cuentas", Math.round(calc.cuentasTotal)].join(sep));
    L.push(["Despensa", Math.round(calc.despensaTotal)].join(sep));
    L.push(["TOTAL GASTOS", Math.round(calc.gasto)].join(sep));
    L.push("");
    L.push("SALDO POR PERSONA");
    L.push(["Persona","Sueldo","Aporte gastos","Ahorro","Libre"].join(sep));
    state.usuarios.forEach(function(u){
      var r=calc.res[u]||{sueldo:0,aporte:0,queda:0};
      L.push([u, r.sueldo||0, Math.round(r.aporte||0), ahorroPP[u]||0, Math.round(r.queda||0)].join(sep));
    });
    L.push("");
    L.push("FONDO DE AHORRO COMÚN");
    state.usuarios.forEach(function(u){ L.push([u, ahorroPP[u]||0].join(sep)); });
    L.push(["TOTAL AHORRO", ahorroTotal].join(sep));
    return L.join("\n");
  }

  function verResumenPantalla(){
    var box=document.getElementById("resumenBox");
    if(!box) return;
    if(box.style.display==="block"){ box.style.display="none"; return; }
    var txt=generarResumenTexto("\t");
    var rows=txt.split("\n").map(function(line){
      if(line==="") return '<tr><td style="padding:3px 0;">&nbsp;</td></tr>';
      var cells=line.split("\t");
      if(cells.length===1){
        return '<tr><td colspan="5" style="font-weight:700;padding:6px 0 2px;color:var(--info);">'+esc(cells[0])+'</td></tr>';
      }
      return '<tr>'+cells.map(function(c){
        var num=/^-?\d+$/.test(c);
        return '<td style="padding:3px 8px 3px 0;'+(num?'text-align:right;font-variant-numeric:tabular-nums;':'')+'">'+esc(num?PESO(+c):c)+'</td>';
      }).join('')+'</tr>';
    }).join('');
    box.innerHTML='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">'+rows+'</table></div>';
    box.style.display="block";
  }

  function copiarResumen(){
    var txt=generarResumenTexto("\t");
    function ok(){ setStatus("Resumen copiado ✓ — pégalo donde quieras","on"); }
    function fail(){
      // Respaldo: mostrar en pantalla para copiar a mano
      verResumenPantalla();
      setStatus("Copia manual: selecciona el texto de abajo","on");
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(ok).catch(fail);
    } else {
      try {
        var ta=document.createElement("textarea");
        ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta); ok();
      } catch(e){ fail(); }
    }
  }

  function descargarCSV(){
    var now=new Date();
    var mesAnio=now.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
    var filename="NuestroHogar_"+mesAnio.replace(/\s+/g,"_")+".csv";
    // BOM para que Excel respete los acentos
    var txt="\uFEFF"+generarResumenTexto(",");
    var blob=new Blob([txt],{type:"text/csv;charset=utf-8;"});
    var esIOS=/iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
    var url=URL.createObjectURL(blob);
    if(esIOS){
      window.open(url,"_blank");
      setStatus("CSV abierto en pestaña nueva → Compartir → Guardar","on");
    } else {
      var a=document.createElement("a");
      a.href=url; a.download=filename;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
      setStatus("CSV descargado ✓ (se abre en Excel)","on");
    }
  }

  function cargarXLSX(cb){
    if(typeof XLSX!=="undefined"){ cb(true); return; }
    var fuentes=[
      "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
      "https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js",
      "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"
    ];
    var i=0;
    function intentar(){
      if(typeof XLSX!=="undefined"){ cb(true); return; }
      if(i>=fuentes.length){ cb(false); return; }
      var s=document.createElement("script");
      s.src=fuentes[i++];
      s.onload=function(){ cb(true); };
      s.onerror=intentar;
      document.head.appendChild(s);
    }
    intentar();
  }

  function exportarExcel(){
    if(typeof XLSX==="undefined"){
      setStatus("Cargando librería Excel…");
      cargarXLSX(function(ok){
        if(ok) exportarExcel();
        else setStatus("No se pudo cargar la librería Excel. Revisa tu internet.","off");
      });
      return;
    }
    var calc=calcularAportes();
    var aprobados=state.ahorros.filter(function(a){return a.estado==="aprobado";});
    var ahorroTotal=aprobados.reduce(function(s,a){return s+(+a.monto||0);},0);
    var ahorroPP={}; state.usuarios.forEach(function(u){ahorroPP[u]=0;});
    aprobados.forEach(function(a){ if(ahorroPP[a.autor]!==undefined) ahorroPP[a.autor]+=(+a.monto||0); });
    var now=new Date();
    var mesAnio=now.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
    var mesLabel=mesAnio.charAt(0).toUpperCase()+mesAnio.slice(1);

    var wb=XLSX.utils.book_new();

    // ---- HOJA 1: RESUMEN ----
    var col1=["Categoría","Total ($)"].concat(state.usuarios.map(function(u){return "Aporte "+u+" ($)";}));
    var filaCuentas=["Cuentas",Math.round(calc.cuentasTotal)].concat(state.usuarios.map(function(u){return Math.round((calc.res[u]||{}).aCuentas||0);}));
    var filaDesp=["Despensa",Math.round(calc.despensaTotal)].concat(state.usuarios.map(function(u){return Math.round((calc.res[u]||{}).aDespensa||0);}));
    var filaTotal=["TOTAL GASTOS",Math.round(calc.gasto)].concat(state.usuarios.map(function(u){return Math.round((calc.res[u]||{}).aporte||0);}));

    var rd=[
      ["RESUMEN MENSUAL — NUESTRO HOGAR"],
      ["Mes: "+mesLabel],
      [],
      ["GASTOS DEL HOGAR"],
      col1,
      filaCuentas,
      filaDesp,
      filaTotal,
      [],
      ["FONDO DE AHORRO COMÚN"],
      ["Persona","Monto ahorrado ($)"]
    ];
    state.usuarios.forEach(function(u){ rd.push([u, ahorroPP[u]||0]); });
    rd.push(["TOTAL AHORRO", ahorroTotal]);
    rd.push([]);
    rd.push(["SALDO POR PERSONA"]);
    rd.push(["Persona","Sueldo ($)","Aporte gastos ($)","Ahorro ($)","Libre ($)"]);
    state.usuarios.forEach(function(u){
      var r=calc.res[u]||{sueldo:0,aporte:0,queda:0};
      rd.push([u, r.sueldo||0, Math.round(r.aporte||0), ahorroPP[u]||0, Math.round(r.queda||0)]);
    });
    rd.push([]);
    rd.push(["DATOS PARA GRÁFICO"]);
    rd.push(["Persona","Gastos ($)","Ahorro ($)"]);
    state.usuarios.forEach(function(u){
      rd.push([u, Math.round((calc.res[u]||{}).aporte||0), ahorroPP[u]||0]);
    });

    var ws1=XLSX.utils.aoa_to_sheet(rd);
    ws1['!cols']=[{wch:24},{wch:16},{wch:16},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb,"Resumen",ws1);

    // ---- HOJA 2: HISTORIAL AHORRO ----
    var ad=[["HISTORIAL DE APORTES AL AHORRO"],["Fecha","Persona","Monto ($)","Folio / Comprobante","Estado"]];
    state.ahorros.slice().reverse().forEach(function(a){
      ad.push([a.fecha||"", a.autor||"", +a.monto||0, a.folio||"", a.estado==="aprobado"?"✓ Aprobado":"⏳ Pendiente"]);
    });
    ad.push([]); ad.push(["TOTAL APROBADO","",ahorroTotal]);
    var ws2=XLSX.utils.aoa_to_sheet(ad);
    ws2['!cols']=[{wch:14},{wch:14},{wch:14},{wch:24},{wch:14}];
    XLSX.utils.book_append_sheet(wb,"Historial Ahorro",ws2);

    // ---- HOJA 3: CUENTAS ----
    var cd=[["CUENTAS DEL HOGAR"],["Concepto","Monto ($)","Estado","Registrada por"]];
    state.cuentas.forEach(function(c){ cd.push([c.nombre||"",+c.monto||0,c.pagado?"Pagada":"Pendiente",c.autor||""]); });
    cd.push(["TOTAL",state.cuentas.reduce(function(s,c){return s+(+c.monto||0);},0)]);
    var ws3=XLSX.utils.aoa_to_sheet(cd);
    ws3['!cols']=[{wch:24},{wch:14},{wch:12},{wch:16}];
    XLSX.utils.book_append_sheet(wb,"Cuentas",ws3);

    // ---- HOJA 4: DESPENSA ----
    var dd=[["GASTOS DE DESPENSA"],["Fecha","Descripción","Monto ($)","Persona"]];
    state.despensa.slice().reverse().forEach(function(d){ dd.push([d.fecha||"",d.nombre||"",+d.monto||0,d.autor||""]); });
    dd.push(["TOTAL","",state.despensa.reduce(function(s,d){return s+(+d.monto||0);},0)]);
    var ws4=XLSX.utils.aoa_to_sheet(dd);
    ws4['!cols']=[{wch:14},{wch:26},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,"Despensa",ws4);

    var filename="NuestroHogar_"+mesAnio.replace(/\s+/g,"_")+".xlsx";
    var MIME="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
    var esIOS=/iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
    try {
      var wbout=XLSX.write(wb,{bookType:"xlsx",type:"array"});
      var blob=new Blob([wbout],{type:MIME});
      var url=URL.createObjectURL(blob);

      if(esIOS){
        // En iPhone/iPad (incluido Chrome, que usa Safari por debajo):
        // abrir el archivo en una pestaña nueva. Desde ahí el usuario toca
        // el botón Compartir del navegador y elige "Guardar en Archivos".
        var win=window.open(url,"_blank");
        if(!win){
          // Si el navegador bloqueó la pestaña, ofrecer enlace directo
          var aIOS=document.createElement("a");
          aIOS.href=url; aIOS.target="_blank"; aIOS.rel="noopener";
          document.body.appendChild(aIOS); aIOS.click();
          document.body.removeChild(aIOS);
        }
        setStatus("Excel abierto en pestaña nueva → toca Compartir → Guardar en Archivos","on");
        setTimeout(function(){ URL.revokeObjectURL(url); },60000);
        return;
      }

      // Computador / Android: descarga directa
      var a=document.createElement("a");
      a.href=url; a.download=filename;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
      setStatus("Excel exportado ✓","on");
    } catch(e) {
      try {
        var wbout2=XLSX.write(wb,{bookType:"xlsx",type:"array"});
        var blob2=new Blob([wbout2],{type:MIME});
        var url2=URL.createObjectURL(blob2);
        window.open(url2,"_blank");
        setStatus("Excel abierto en otra pestaña — usa Compartir para guardarlo","on");
      } catch(e2){
        setStatus("No se pudo exportar. Recarga la página e intenta de nuevo.","off");
      }
    }
  }

  iniciar();
})();
</script>
